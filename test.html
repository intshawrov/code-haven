
<!-- Hamburg Start -->

<div class="show_custom_menu">

    <div class="line-container">

        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>

    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

document.querySelector(".show_custom_menu").addEventListener("click", function(){

    document.querySelector(".line-container").classList.toggle("active");

});

});
</script>

<style>
    .line {
    width: 40px;
    height: 3px;
    background: #000;
    margin: 4px 0;
    transition: all 0.4s ease;
    border-radius: 999px;
}

.line-container.active .line:nth-child(1){
    transform: translateY(7px) rotate(45deg);
}

.line-container.active .line:nth-child(2){
    opacity: 0;
}

.line-container.active .line:nth-child(3){
    transform: translateY(-7px) rotate(-45deg);
}

.line-container:hover .line{
    background: #808080!important;
}




@media (max-width:767px){
    .line-container.active .line{
    background: #ffffff !important;
    
}

}
</style>

<!-- Hamburg End -->
